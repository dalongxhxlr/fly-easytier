name: Fly.io Usage Limit

on:
  schedule:
    - cron: "0 14 * * *"   
    # 每天 14:00 UTC 执行一次，北京时间 22 点执行，完全避开 Fly.io 的账单刷新期，usage API 会稳定返回 JSON
  workflow_dispatch:

jobs:
  limit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check usage and stop machine if needed
        run: |
          python3 limit.py
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
