name: Stop Machine (Daily)

on:
  schedule:
    - cron: "0 11 * * *"   # 每天 UTC 11:00，即北京时间 19:00
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stop machine
        run: flyctl machines stop 1781e7e4a27328 --app fly-easytier-ipv4
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
