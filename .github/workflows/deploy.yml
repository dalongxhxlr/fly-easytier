name: Deploy EasyTier to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Update Secrets (with retry)
        run: |
          for i in 1 2 3; do
            flyctl secrets set \
              ET_NETWORK_NAME="${{ secrets.ET_NETWORK_NAME }}" \
              ET_NETWORK_SECRET="${{ secrets.ET_NETWORK_SECRET }}" \
              ET_PEERS="${{ secrets.ET_PEERS }}" --app fly-easytier-ipv4 && break
            echo "Retrying secrets update ($i/3)..."
            sleep 5
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
