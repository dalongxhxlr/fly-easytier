name: Deploy EasyTier to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. 检查 Fly.io 月度限额
      - name: Check Fly.io monthly limit
        id: check_limit
        run: |
          FILE="platform_limits.json"

          # 如果文件不存在，创建默认文件
          if [ ! -f "$FILE" ]; then
            echo "platform_limits.json not found, creating default..."
            cat > "$FILE" << 'EOF'
          {
            "flyio": {
              "monthly_limit_minutes": 900,
              "usage_minutes": 0,
              "year": 2026,
              "month": 3
            }
          }
EOF
          fi

          YEAR_NOW=$(date +%Y)
          MONTH_NOW=$(date +%-m)

          LIMIT=$(jq '.flyio.monthly_limit_minutes' "$FILE")
          USAGE=$(jq '.flyio.usage_minutes' "$FILE")
          YEAR=$(jq '.flyio.year' "$FILE")
          MONTH=$(jq '.flyio.month' "$FILE")

          echo "Current limit: $LIMIT minutes"
          echo "Current usage: $USAGE minutes"
          echo "Record year/month: $YEAR/$MONTH"
          echo "Now year/month: $YEAR_NOW/$MONTH_NOW"

          # 跨月自动重置
          if [ "$YEAR_NOW" -ne "$YEAR" ] || [ "$MONTH_NOW" -ne "$MONTH" ]; then
            echo "New month detected, resetting usage..."
            jq ".flyio.usage_minutes = 0 | .flyio.year = $YEAR_NOW | .flyio.month = $MONTH_NOW" "$FILE" > tmp.json
            mv tmp.json "$FILE"
            USAGE=0
          fi

          # 判断是否超额
          if [ "$USAGE" -ge "$LIMIT" ]; then
            echo "Fly.io monthly limit reached: $USAGE / $LIMIT minutes"
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "Fly.io monthly usage OK: $USAGE / $LIMIT minutes"
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      # 2. 超额则跳过部署
      - name: Stop if limit reached
        if: steps.check_limit.outputs.skip_deploy == 'true'
        run: |
          echo "Monthly limit reached, skipping deployment."
          exit 0

      # 3. 安装 flyctl
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check_limit.outputs.skip_deploy == 'false'

      # 4. Fly.io 部署
      - name: Deploy to Fly.io
        if: steps.check_limit.outputs.skip_deploy == 'false'
        run: |
          # 设置 Secrets
          flyctl secrets set \
            ET_NETWORK_NAME="${{ secrets.ET_NETWORK_NAME }}" \
            ET_NETWORK_SECRET="${{ secrets.ET_NETWORK_SECRET }}" \
            ET_PEERS="${{ secrets.ET_PEERS }}" --app fly-easytier-ipv4

          # 执行部署
          flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # 5. 部署成功后累加用量（45 分钟）
      - name: Update Fly.io usage
        if: steps.check_limit.outputs.skip_deploy == 'false'
        run: |
          FILE="platform_limits.json"
          EXTRA=45  # 每次部署预计运行 45 分钟

          YEAR_NOW=$(date +%Y)
          MONTH_NOW=$(date +%-m)

          LIMIT=$(jq '.flyio.monthly_limit_minutes' "$FILE")
          USAGE=$(jq '.flyio.usage_minutes' "$FILE")
          YEAR=$(jq '.flyio.year' "$FILE")
          MONTH=$(jq '.flyio.month' "$FILE")

          if [ "$YEAR_NOW" -ne "$YEAR" ] || [ "$MONTH_NOW" -ne "$MONTH" ]; then
            USAGE=0
          fi

          NEW_USAGE=$((USAGE + EXTRA))
          echo "Updating usage: $USAGE + $EXTRA = $NEW_USAGE"

          jq ".flyio.usage_minutes = $NEW_USAGE | .flyio.year = $YEAR_NOW | .flyio.month = $MONTH_NOW" "$FILE" > tmp.json
          mv tmp.json "$FILE"

      # 6. 提交更新后的 platform_limits.json
      - name: Commit updated usage
        if: steps.check_limit.outputs.skip_deploy == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform_limits.json
          git commit -m "Update Fly.io usage" || echo "No changes to commit"
          git push || echo "No changes to push"

