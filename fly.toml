app = "fly-easytier-ipv4"
primary_region = "nrt"

[build]
  # 保持为空，让 Fly 自动使用 Dockerfile

[deploy]
  strategy = "immediate"

[env]
  # 清理了旧的 Gost 变量，保持纯净


[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]


[checks]
  [checks.xray_tcp]
    port = 8080
    type = "tcp"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"