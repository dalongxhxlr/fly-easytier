app = "fly-easytier-ipv4"
primary_region = "nrt"

[build]
  # 保持为空，让 Fly 自动使用 Dockerfile

[deploy]
  strategy = "immediate"

[env]
  # 清理了旧的 Gost 变量，保持纯净

[[services]]
internal_port = 8080
protocol = "tcp"

auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[services.ports]]
port = 8080
handlers = []